<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>표실습</title>
    <style>
        table{
            border: 1px solid black;
            border-collapse: collapse;
            caption-side: bottom;

        }
        td{
            border: 1px solid black;
            text-align: center;
        }
        th{
            border: 1px solid black;
            background-color: gold;
        }
        .a{
            background-color: gold;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <table>
        <caption>2019 국민 도서실태</caption>
        <thead>
            <tr>
                <th>구분</th>
                <th>성인</th>
                <th>독서자</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="a">종이책</td>
                <td>6.1권</td>
                <td>11.8권</td>
            </tr>
            <tr>
                <td class="a">전자책</td>
                <td>1.2권</td>
                <td>7.1권</td>
            </tr>
            <tr>
                <td class="a">오디오북</td>
                <td>0.2권</td>
                <td>5.5권</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
