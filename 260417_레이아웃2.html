<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>레이아웃1</title>
    <style>
        header{
            background-color: blueviolet;
        }
        main{
            background-color: #ffdf5b;
            height: 1000px;
            float: left;
            width: 100%;
        }
        footer{
            background-color: lightgray;
            clear: both;
        }
        aside{
            float: left;
            width: 25%;
            background-color: chartreuse;
            height: 1000px;
        }
        #left{
            float: left;
            width: 200px;
            height: 1000px;
            background-color: darkmagenta;
        }
        #right{
            float: left;
            width: 200px;
            height: 1000px;
            background-color: darkmagenta;
        }
    </style>
</head>
<body>
    <header>
        header
    </header>
    <aside id="left">
        aside
    </aside>
    <main>
        main
    </main>
    <aside id="right">
        aside
    </aside>
    <footer>
        footer
    </footer>








</body>
</html>
