<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>글자, 텍스트</title>
    <style>
        .d1{
            text-decoration: underline;
            word-spacing: 10px;
        }
        .d2{
            text-transform: capitalize; /* 앞글자 대문자 */
            text-transform: uppercase;  /* 전체 대문자 */
            text-shadow: -3px 5px 4px darkolivegreen;
            text-align: justify; /* 양쪽 정렬 */
        }
        .d3{
            text-decoration: overline;
            letter-spacing: 4px;
        }
        p{
            line-height: 30px;
            color: #ff1180;
        }
    </style>
</head>
<body>
    <div class="d1">배드민턴 치고싶다</div>
    <div class="d2">this is test</div>
    <div class="d3">배드민턴 치고싶다</div>
    <p>
        this is test <br>
        this is test
    </p>
</body>
</html>
