<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>배경요소</title>
</head>
<style>
    button{
        width: 200px;
        height: 200px;
        border-radius: 50%;
        overflow: hidden; /* 사진이 튀어나가지 않게 */
        text-align: center;
    }
    img{
        /*width: 100%;*/
    }
    #b2{
        border: #ff98d1 10px solid;
        border-top-color: gold;
        border-left-color: red;
        border-right-color: blue;
        cursor: pointer;
        /*background-color: #ffdf5b;*/
        background-image: url("https://pbs.twimg.com/media/HArgM5ebEAAGFpi.jpg");
        background-position: center;
        /* contain: 이미지의 가로 혹은 세로를 부모 크기로 맞춰보고 부모까지 닿으면 커지기 중지.
        부모를 넘지 않고 최대한 크게 */
        /* cover: 부모를 여백 안남기고 꽉 채울 때까지 이미지를 크게 키움. */
        /* 자식에 absolute 있으면 relative 주세요*/
        display: inline-block;
        background-size: cover;
        background-repeat: no-repeat;
        }
    #b3{
        display: inline-block;
        width: 50px;
        height: 50px;
        border: none;
        /* 부모 위치 기준으로 자리를 잡아라. */
        /* 부모 정하는 기준! => position이 static이 아닌 부모를 기준으로 함!*/
        position: absolute;
        bottom: 0; /* 부모의 바닥에 붙여라 */
        right: 10px;
        background-image: url("https://img.icons8.com/?size=100&id=7211&format=png&color=000000");
        background-size: 50%;
        background-repeat: no-repeat;
        background-position: center;
    }
    div{
        display: inline-block;
        position: relative;
    }
    section{
        width: 120px;
        height: 200px;
        background-color: olive;
        overflow: auto;
    }
</style>
<body>
    <button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTOOvV_midVD_RFN5HcjgsvhyfjeX_fCQIS1A&s" alt="">
    </button>
    <div>
        <button id="b2"></button>
        <button id="b3"></button>
    </div>
    <section>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Animi deserunt eos exercitationem facilis ipsum maiores minus molestias, pariatur quis sit, vel veritatis! Alias debitis dignissimos magni, mollitia odio quidem voluptatum.
    </section>
</body>
</html>
