<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>타입선택자</title>
</head>
<style>
    /* 주석처리 */
    *{
        font-size: 30px;
    }
    /* 태그(타입) 선택자, 태그 이름을 명시함 */
    div{
        color: cadetblue;
    }
    /* ('.'사용)클래스(class) 선택자, 태그에 해당 클래스가 들어있으면 선택됨*/
    .d{
        background-color: bisque;
    }
    .d2{
        font-weight: bold;
        background-color: coral;
    }
    /* id선택자: '#'을 사용함. id="d5"가 있는 요소를 선택함 */
    #d5{
        font-style: italic;
    }
    /* id=d5인 요소와, a태그와, b태그에, 적용해줘 */
    #d5, a, b {
        color: indigo;
    }
    .b2{
        font-size: larger;
        color: lime;
    }
    ul{
        color: darkred;
    }
</style>
<body>
    <span class="d">span</span>
    <div>div1</div>
    <div class="d">div2</div>
<!--    클래스 속석은 값을 여러개 넣을 수 있음. 띄어쓰기로 구분.  -->
    <div class="d d2">div3</div>
    <div class="d2">div4</div>
<!-- id는 문서 내에서 한개만 존재할 때, 혹은 하나를 독자적으로 사용하고 싶을 때 사용   -->
    <div id="d5">div5</div>
    <br>
    <a href="#">A태그(링크)</a><br>
    <b>B태그(진하게)</b><br>
    <b class="b2">B태그2(진하게)</b><br>


<!-- 스타일 상속, ul태그에 스타일을 지정하면 li 태그에도 적용된다.   -->
    <ul>
        <li>
            <a href="#">li의 a태그</a>
        </li>
        <li>
            <span>span</span>
        </li>
    </ul>



</body>
</html>
