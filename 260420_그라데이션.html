<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>그라데이션</title>
</head>
<style>
    div{
        width: 500px;
        height: 500px;
        border: 1px solid black;
    }
    .grad1{
        /* 왼쪽 위에서 오른쪽 아래 방향으로, 파랑에서 흰색으로 변하기 */
        background: linear-gradient(to right bottom, blue, white);
    }
    .grad2{
        /* 오른쪽 위 (45도) 방향으로 red에서 white 로 */
        background: linear-gradient(45deg, red, white);
    }
    .grad3{
        /* 위에서 아래로 초록으로 시작해서 30% 지점까지는 화이트로, 그 이후에는 하늘색으로 */
        background: linear-gradient(to bottom, green, white 30%, powderblue);
    }
    .grad4{
        width: 700px;
        /* 타원형으로 흰색, 노란색, 빨간색으로 바뀌게 */
        background: radial-gradient(white, yellow, red);
    }
    .grad5{
        /* 타원형으로 흰색, 노란색, 빨간색으로 바뀌게 */
        width: 700px;
        background: radial-gradient(circle, white, yellow, red);
    }
    .grad6{
        /* 그라데이션 중심에서 가장 까가운 측면에 닿을 때까지 */
        /*closest-side: 측면, closest-corner: 꼭지점 */
        background: radial-gradient(circle closest-side at 99% 1%, white, yellow, green);
    }
    .grad7{
        /* x:20%, y:20% 위치에서 시작해서 흰색에서 파란색으로 변경 */
        background: radial-gradient(circle at 20% 20%, white, blue);
    }
    .grad8{
        background: repeating-linear-gradient(yellow, red 20%);
    }
    .grad9{
        background: repeating-radial-gradient(circle, white, blue 10%);
    }

    .grad10{
        background: repeating-radial-gradient(circle, white, white 10%, green 10%, blue 20%);
    }
</style>
<body>
    <div class="grad1"></div>
    <div class="grad2"></div>
    <div class="grad3"></div>

    <div class="grad4"></div>
    <div class="grad5"></div>
    <div class="grad6"></div>

    <div class="grad7"></div>
    <div class="grad8"></div>
    <div class="grad9"></div>
    <div class="grad10"></div>


</body>
</html>
