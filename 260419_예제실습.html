<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가정용 꿀사과</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        width: 500px;
        margin: 50px;
        border: black solid 1px;
    }
    .banner {
        background: url('https://img1.daumcdn.net/thumb/R1280x0.fjpg/?fname=http://t1.daumcdn.net/brunch/service/user/2xMI/image/9vk0DHXiQYuN4RLiiLr8_02fIeE.jpg') no-repeat center/cover;
        height: 300px;
        position: relative;
    }

    .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 20px;
        background: rgb(0 0 0 / 0.7);
        color: white;
    }

    .overlay h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    .overlay p {
        color: #ffa74f;
        font-size: 14px;
    }

    .info {
        /*background: #eee;*/
        padding-top: 20px;
    }

    .title {
        background: black;
        color: white;
        /*padding: 10px;*/
        font-size: 20px;
    }

    .box {
        background: white;
        /*padding: 20px;*/
        text-align: center;
    }

    .red {
        color: red;
        margin: 15px 0 10px;
    }

    .blue {
        color: blue;
        font-weight: bold;
    }

    .phone {
        font-size: 18px;
        margin: 10px 0;
    }
    .CustomerService{
        border-top: black solid 1px;
        padding-bottom: 20px;
        margin-top: 20px;
    }
</style>

<body>
<section class="banner">
    <div class="overlay">
        <h1>가정용 꿀사과</h1>
        <p>흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다</p>
        <p>질좋은 사과를 저렴하게 즐겨보세요</p>
    </div>
</section>

<section class="info">
    <h2 class="title">확인하세요</h2>

    <div class="box">
        <h3 class="red">주문 및 배송</h3>
        <p><span class="blue">오후 2시 이전</span> 주문건은 당일 발송합니다</p>
        <p>2시 이후 주문건은 다음날 발송합니다(주말제외)</p>

        <h3 class="red">교환 및 환불</h3>
        <p>불만족시 <span class="blue">100% 환불</span>해 드립니다</p>
        <p>고객센터로 전화주세요</p>
            <section class="CustomerService">
            <h3 class="red">고객센터</h3>
            <p class="phone">0000-0000</p>
            <p>상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</p>
        </section>
    </div>
</section>

</body>
</html>
