<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>실습 연습</title>
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        *{
            font-family: OngleipParkDahyeon;
        }
        h1>span{
            background-color: blue;
            color: white;
            font-weight: normal;
            /*width: 4em;*/

        }
        b{
            color: red;
            font-size: 20px;
        }
        sup{
            font-style: italic;
        }
        .jeju{
            color: coral;
        }

        div{
            text-align: center;
        }
        .bold{
            font-weight: bold;
        }

    </style>
</head>
<body>
    <h1><span>탐라국 입춘굿</span></h1>

    <p class="bold">
        <span class="jeju">제주</span>도의 문화축제 중에서 유일하게 <b>탐라 시대부터 내려온 축제</b>이다
    </p>

    <p>
        <div>
            제주에서 입춘은 새철<sup>(<span class="jeju">제주</span>어,샛절)</sup>드는 날이라 한다.<br>
            하늘의 1만 8,000 신이 지상으로 내려와 새해 일들을 시작하는 때다.
        </div>
    </p>


</body>
</html>
