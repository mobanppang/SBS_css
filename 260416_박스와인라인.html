<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>박스와 인라인</title>
    <style>
        pre{
            /*background-color: #ff1180;*/
        }
    </style>
</head>
<body>
    <h2>블록레벨 요소(h1~6)</h2>
    <h3>- 영역 관련 태그들 -</h3>
    <div>div태그</div>
    <!-- section 기자 정보 -->
    <section>section태그</section>
    <!-- article 메인 안에 아티클 여러개 만들기 가능, 블로그 글, 아티클 안에 섹션 여러개 넣기 가능-->
    <article>article태그</article>
    <aside>aside태그</aside>
    <header>header태그</header>
    <main>main태그</main>
    <footer>footer태그</footer>
    <nav>nav태그</nav>
    <hr>
    <h3>- 텍스트 관련 태그 -</h3>
    <!-- 전체 섹션(아티클) 안에 문단(p태그) 넣기  -->
    <p>p</p>
    <blockquote>blockquote태그</blockquote>
    <pre>pre태그</pre>
    <code>code태그</code>
    <h3>- 목록 관련 태그 -</h3>
    <ul><li>ul-li</li></ul>
    <ol><li>ol-li</li></ol>
    <dl><dt>dl-dt</dt><dd>dl-dd</dd></dl>

    <h2>인라인 태그</h2>
    <span>span태그</span>
    <a href="">a태그</a>
    <b>b태그</b>
    <em>em태그</em>
    <i>i태그</i>
    <mark>mark태그</mark>
    <small>small태그</small>
    <sub>sub태그</sub>
    <sup>sup태그</sup>
    <del>del태그</del>
    <ins>ins태그</ins>
    <abbr title=""></abbr>
    <q>q-인용구</q>
    <cite>cite태그</cite>
    <img src="#" alt="img">


</body>
</html>
