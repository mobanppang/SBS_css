<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가정용꿀사과 실습</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    body{
        width: 500px;
        border: black solid 1px;
        margin: 0 auto;
    }

    h2{
        background-color: black;
        color: white;
        margin-top: 20px;
    }
    h3{
        text-align: center;
        color: red;
        /*padding: 5px;*/
    }
    b{
        color: blue;

    }
    div{
        text-align: center;
    }
    .d1{
        text-align: center;
        padding-bottom: 20px;
    }
    .d3{
        text-align: center;
        border-top: black solid 1px;
        padding: 10px 0 20px 0;
    }
    .img{
        background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTOoNKM5m6L_L7l3zMm8zojXM0vqsMV0XpTFA&s");
        height: 300px;
        background-repeat: no-repeat;
        background-size: 100%;
        position: static;
    }
    .bg{
        display: inline-block;
        background-color: rgb(0 0 0 / 0.6);
        position: relative;
        width: 100%;
        bottom: 0;
        padding: 20px;
        background-size: contain;
    }
    .img h3{
        text-align: left;
        color: white;
    }
    .img p{
        color: #ffa74f;
        text-align: left;
    }

</style>
<body>
    <div class="img">
        <div class="bg">
            <h3>가정용 꿀사과</h3>
            <p>흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다 <br>
            질좋은 사과를 저렵하게 즐겨보세요</p>
        </div>
    </div>
    <h2>확인하세요</h2>
    <div class="d1">
        <h3>주문 및 배송</h3>
        <p><b>오후 2시 이전</b>주문건은 당일 발송합니다 <br>
        2시 이후 주문건은 다음날 발송합니다(주말제외)</p>
    </div>
    <div class="d2">
        <h3>교환 및 환불</h3>
        <p>불만족시 <b>100% 환불</b>해 드립니다 <br>
        고객센터로 전화주세요</p>
    </div>
    <div class="d3">
        <h3>고객센터</h3>
        <p>0000-0000 <br>
        상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</p>
    </div>
</body>
</html>
